# Native mode — codeAgent tools only, no grep enrichment
#
# Explicit tools: codeAgent-query, codeAgent-context, codeAgent-impact, codeAgent-cypher
# Available as fast bash commands (~100ms via eval-server)
#
# Use this mode to isolate the value of explicit tools without grep augmentation.
agent:
  agent_class: "eval.agents.codeAgent_agent.codeAgentAgent"
  codeAgent_mode: "native"
  step_limit: 30
  cost_limit: 3.0
  track_codeAgent_usage: true

environment:
  environment_class: "eval.environments.codeAgent_docker.codeAgentDockerEnvironment"
  enable_codeAgent: true
  skip_embeddings: true
  codeAgent_timeout: 120
  eval_server_port: 4848
