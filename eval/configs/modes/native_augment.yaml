# Native + Augment mode — the primary evaluation mode
#
# Combines two capabilities (mirroring the Claude Code model):
# 1. Explicit codeAgent tools: codeAgent-query, codeAgent-context, codeAgent-impact, codeAgent-cypher
#    Available as fast bash commands (~100ms via eval-server)
# 2. Automatic grep enrichment: grep/rg results are transparently augmented with
#    [codeAgent] annotations showing callers, callees, and execution flows
#
# The agent decides when to use explicit tools vs rely on enriched grep results.
agent:
  agent_class: "eval.agents.codeAgent_agent.codeAgentAgent"
  codeAgent_mode: "native_augment"
  step_limit: 30
  cost_limit: 3.0
  augment_timeout: 5.0
  augment_min_pattern_length: 3
  track_codeAgent_usage: true

environment:
  environment_class: "eval.environments.codeAgent_docker.codeAgentDockerEnvironment"
  enable_codeAgent: true
  skip_embeddings: true
  codeAgent_timeout: 120
  eval_server_port: 4848
